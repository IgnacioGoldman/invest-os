# ─── Allocation & Cash Skills ───
# Rules a conservative, safety-first investor follows.
# Covers long-term positions AND short swing trades (week/month).

# ---------- Cash Reserve ----------
cash_reserve:
  description: Keep enough cash to survive drawdowns and seize opportunities.
  target_percent: 20        # ideal cash / net-worth ratio
  warning_low_percent: 10   # below this → under-cashed
  warning_high_percent: 40  # above this → under-invested

# ---------- Invested Ratio ----------
invested_ratio:
  description: Track how much of net worth is deployed in positions.
  target_percent: 80
  overinvested_threshold: 90
  underinvested_threshold: 60

# ---------- Single-Position Concentration ----------
concentration:
  description: No single holding should dominate the portfolio.
  max_single_position_percent: 25   # hard cap
  warn_single_position_percent: 15  # soft warning

# ---------- Asset-Class Diversification ----------
diversification:
  description: Spread risk across asset classes.
  min_asset_classes: 2
  preferred_asset_classes: [equity, crypto, etf, rsu, bond]

# ---------- Platform Diversification ----------
platform_risk:
  description: Avoid concentrating everything on one platform.
  max_single_platform_percent: 60

# ---------- Swing / Short-Term Trading ----------
swing_trading:
  description: Guidelines for week-to-month trades.
  max_open_orders_percent_of_invested: 30  # open order value vs invested
  prefer_limit_orders: true
  warn_many_open_orders: 10                # flag if too many open at once

# ---------- Stale Data ----------
stale_data:
  description: Positions valued with old prices are risky to act on.
  warn_hours: 48
